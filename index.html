<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0"/>

<title>Top FCY Exposure Table</title>

<!-- TABLEAU -->
<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>

<style>

/* ======================================================
   GLOBAL
====================================================== */

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#f4f7fb;

    font-family:
        Inter,
        Segoe UI,
        Arial,
        sans-serif;
}

/* ======================================================
   WRAPPER
====================================================== */

.wrapper{

    width:100%;
    height:100%;

    padding:18px;

    box-sizing:border-box;
}

/* ======================================================
   CARD
====================================================== */

.card{

    width:100%;
    height:100%;

    background:white;

    border-radius:20px;

    overflow:hidden;

    border:
        1px solid #e2e8f0;

    box-shadow:
        0 6px 24px rgba(15,23,42,.06);
}

/* ======================================================
   HEADER
====================================================== */

.header{

    height:76px;

    padding:0 22px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    border-bottom:
        1px solid #edf2f7;
}

.header-left{

    display:flex;
    flex-direction:column;
    gap:4px;
}

.title{

    font-size:18px;
    font-weight:700;

    color:#0f172a;
}

.count{

    font-size:13px;

    color:#64748b;
}

/* ======================================================
   TOOLBAR
====================================================== */

.toolbar{

    display:flex;
    align-items:center;
    gap:10px;
}

.toolbar-label{

    font-size:13px;
    font-weight:600;

    color:#475569;
}

.top-input{

    width:80px;

    padding:10px 12px;

    border-radius:12px;

    border:
        1px solid #dbe3ee;

    background:white;

    outline:none;

    font-size:14px;
    font-weight:600;

    transition:.2s;
}

.top-input:focus{

    border-color:#2563eb;

    box-shadow:
        0 0 0 4px rgba(37,99,235,.08);
}

/* ======================================================
   TABLE
====================================================== */

.table-container{

    height:calc(100% - 76px);

    overflow:auto;
}

table{

    width:100%;

    border-collapse:collapse;

    table-layout:fixed;
}

/* ======================================================
   HEADER ROW
====================================================== */

thead{

    position:sticky;
    top:0;

    z-index:99;
}

thead tr{

    background:#f8fafc;
}

th{

    padding:16px 18px;

    text-align:left;

    font-size:12px;
    font-weight:700;

    color:#475569;

    text-transform:uppercase;
    letter-spacing:.04em;

    border-bottom:
        1px solid #e2e8f0;
}

/* ======================================================
   BODY
====================================================== */

tbody tr{

    transition:background .15s ease;
}

tbody tr:nth-child(even){

    background:#fafcff;
}

tbody tr:hover{

    background:#eff6ff;
}

td{

    padding:15px 18px;

    border-bottom:
        1px solid #f1f5f9;

    color:#0f172a;

    font-size:14px;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

/* ======================================================
   NUMERIC
====================================================== */

.num{

    text-align:right;

    font-weight:600;

    font-variant-numeric:
        tabular-nums;
}

/* ======================================================
   BADGE
====================================================== */

.badge{

    display:inline-flex;
    align-items:center;
    justify-content:center;

    padding:6px 12px;

    border-radius:999px;

    background:#eff6ff;

    color:#2563eb;

    font-size:12px;
    font-weight:700;
}

/* ======================================================
   SCROLLBAR
====================================================== */

::-webkit-scrollbar{

    width:10px;
    height:10px;
}

::-webkit-scrollbar-track{

    background:#f8fafc;
}

::-webkit-scrollbar-thumb{

    background:#cbd5e1;

    border-radius:20px;
}

</style>

</head>

<body>

<div class="wrapper">

    <div class="card">

        <!-- =========================================
             HEADER
        ========================================== -->

        <div class="header">

            <div class="header-left">

                <div class="title">
                    Top FCY Exposure Branches
                </div>

                <div class="count"
                     id="rowCount">
                    0 Rows
                </div>

            </div>

            <!-- TOP N -->

            <div class="toolbar">

                <div class="toolbar-label">
                    Top N
                </div>

                <input
                    type="number"
                    id="topN"
                    class="top-input"
                    value="10"
                    min="1"
                />

            </div>

        </div>

        <!-- =========================================
             TABLE
        ========================================== -->

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th style="width:35%">
                            Branch Name
                        </th>

                        <th style="width:15%">
                            Currency
                        </th>

                        <th style="width:25%">
                            FCY
                        </th>

                        <th style="width:25%">
                            LKR Mn
                        </th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

/* ======================================================
   VARIABLES
====================================================== */

let worksheet;

/* ======================================================
   FORMAT NUMBER
====================================================== */

function formatNumber(v){

    return new Intl.NumberFormat(

        'en-US',

        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }

    ).format(v || 0);
}

/* ======================================================
   GET DATA
====================================================== */

async function getData(){

    const summaryData =
        await worksheet.getSummaryDataAsync();

    const columns =
        summaryData.columns.map(c => c.fieldName);

    console.log("COLUMNS:", columns);

    return summaryData.data.map(row => {

        let obj = {};

        row.forEach((cell, i) => {

            obj[columns[i]] = cell;

        });

        return obj;
    });
}

/* ======================================================
   PROCESS DATA
====================================================== */

function processData(data){

    if(!data.length){
        return [];
    }

    const keys =
        Object.keys(data[0]);

    console.log("FIELDS:", keys);

    const branchField =
        keys.find(k =>
            k.toLowerCase().includes('branch')
        );

    const currencyField =
        keys.find(k =>
            k.toLowerCase().includes('currency')
        );

    const fcyField =
        keys.find(k =>
            k.toLowerCase().includes('fcy')
        );

    const lkrField =
        keys.find(k =>
            k.toLowerCase().includes('lkr')
        );

    console.log({

        branchField,
        currencyField,
        fcyField,
        lkrField

    });

    let rows = [];

    data.forEach(d => {

        const branch =
            d[branchField]
            ? d[branchField].formattedValue
            : '';

        const currency =
            d[currencyField]
            ? d[currencyField].formattedValue
            : '';

        const fcy =
            d[fcyField]
            ? Number(d[fcyField].nativeValue || 0)
            : 0;

        const lkr =
            d[lkrField]
            ? Number(d[lkrField].nativeValue || 0)
            : 0;

        rows.push({

            branch,
            currency,
            fcy,
            lkr

        });

    });

    /* SORT */

    rows.sort((a,b) => b.lkr - a.lkr);

    /* TOP N */

    const topN =
        Number(
            document.getElementById('topN').value
        ) || 10;

    return rows.slice(0, topN);
}

/* ======================================================
   RENDER
====================================================== */

function render(rows){

    const tbody =
        document.getElementById('tableBody');

    tbody.innerHTML = '';

    rows.forEach(r => {

        const tr =
            document.createElement('tr');

        tr.innerHTML = `

            <td>
                ${r.branch}
            </td>

            <td>
                <span class="badge">
                    ${r.currency}
                </span>
            </td>

            <td class="num">
                ${formatNumber(r.fcy)}
            </td>

            <td class="num">
                ${formatNumber(r.lkr)}
            </td>

        `;

        tbody.appendChild(tr);
    });

    document.getElementById('rowCount').innerText =
        `${rows.length} Rows`;
}

/* ======================================================
   UPDATE
====================================================== */

async function update(){

    try{

        const raw =
            await getData();

        console.log("RAW:", raw);

        const rows =
            processData(raw);

        console.log("ROWS:", rows);

        render(rows);

    }catch(error){

        console.error(error);
    }
}

/* ======================================================
   INIT
====================================================== */

window.onload = async function(){

    try{

        await tableau.extensions.initializeAsync();

        const dashboard =
            tableau.extensions.dashboardContent.dashboard;

        console.log(
            "WORKSHEETS:",
            dashboard.worksheets.map(w => w.name)
        );

        /* =========================================
           PICK YOUR WORKSHEET
        ========================================= */

        worksheet =
            dashboard.worksheets[0];

        console.log(
            "CONNECTED:",
            worksheet.name
        );

        worksheet.addEventListener(

            tableau.TableauEventType.SummaryDataChanged,

            update
        );

        document
            .getElementById('topN')
            .addEventListener(

                'input',

                update
            );

        update();

    }catch(error){

        console.error(
            "INIT ERROR:",
            error
        );
    }
};

</script>

</body>

</html>
