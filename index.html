<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0"/>

<title>FCY Exposure Dashboard</title>

<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>

<style>

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#f4f7fb;

    font-family:
        Inter,
        Segoe UI,
        Arial,
        sans-serif;
}

/* ======================================================
   WRAPPER
====================================================== */

.wrapper{

    width:100%;
    height:100%;

    padding:18px;

    box-sizing:border-box;
}

/* ======================================================
   CARD
====================================================== */

.card{

    width:100%;
    height:100%;

    background:white;

    border-radius:24px;

    overflow:hidden;

    border:
        1px solid #e2e8f0;

    box-shadow:
        0 10px 30px rgba(15,23,42,.06);

    display:flex;
    flex-direction:column;
}

/* ======================================================
   HEADER
====================================================== */

.header{

    padding:18px 22px;

    border-bottom:
        1px solid #edf2f7;

    display:flex;
    justify-content:space-between;
    align-items:center;

    flex-wrap:wrap;

    gap:14px;
}

.title{

    font-size:20px;
    font-weight:700;

    color:#0f172a;
}

.subtitle{

    font-size:13px;

    color:#64748b;

    margin-top:4px;
}

/* ======================================================
   TOOLBAR
====================================================== */

.toolbar{

    display:flex;
    align-items:center;
    gap:12px;

    flex-wrap:wrap;
}

.control{

    padding:11px 14px;

    border-radius:12px;

    border:
        1px solid #dbe3ee;

    background:white;

    outline:none;

    font-size:14px;
    font-weight:600;

    color:#0f172a;
}

/* ======================================================
   TOGGLE
====================================================== */

.toggle{

    display:flex;

    background:#f1f5f9;

    border-radius:14px;

    padding:4px;

    gap:4px;
}

.toggle-btn{

    border:none;

    background:transparent;

    padding:10px 16px;

    border-radius:10px;

    cursor:pointer;

    font-size:13px;
    font-weight:700;

    color:#475569;

    transition:.2s;
}

.toggle-btn.active{

    background:white;

    color:#2563eb;

    box-shadow:
        0 2px 8px rgba(37,99,235,.15);
}

/* ======================================================
   TABLE
====================================================== */

.table-container{

    flex:1;

    overflow:auto;
}

table{

    width:100%;

    border-collapse:collapse;

    table-layout:fixed;
}

thead{

    position:sticky;
    top:0;

    z-index:10;
}

thead tr{

    background:#f8fafc;
}

th{

    padding:16px 18px;

    text-align:left;

    font-size:12px;
    font-weight:800;

    color:#475569;

    text-transform:uppercase;

    border-bottom:
        1px solid #e2e8f0;
}

tbody tr:nth-child(even){

    background:#fbfdff;
}

tbody tr:hover{

    background:#eef6ff;
}

td{

    padding:16px 18px;

    border-bottom:
        1px solid #f1f5f9;

    font-size:14px;

    color:#0f172a;
}

.num{

    text-align:right;

    font-weight:700;
}

.badge{

    display:inline-flex;

    padding:6px 12px;

    border-radius:999px;

    background:#eff6ff;

    color:#2563eb;

    font-size:12px;
    font-weight:700;
}

</style>

</head>

<body>

<div class="wrapper">

    <div class="card">

        <!-- HEADER -->

        <div class="header">

            <div>

                <div class="title">
                    FCY Exposure Dashboard
                </div>

                <div class="subtitle"
                     id="rowCount">

                    0 Rows

                </div>

            </div>

            <!-- TOOLBAR -->

            <div class="toolbar">

                <!-- WORKSHEET -->

                <select id="worksheetSelect"
                        class="control">

                </select>

                <!-- MODE -->

                <div class="toggle">

                    <button
                        id="branchBtn"
                        class="toggle-btn active">

                        Branch

                    </button>

                    <button
                        id="branchCurrencyBtn"
                        class="toggle-btn">

                        Branch + Currency

                    </button>

                </div>

                <!-- TOP N -->

                <input
                    type="number"
                    id="topN"
                    class="control"
                    value="10"
                    min="1"
                />

            </div>

        </div>

        <!-- TABLE -->

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th style="width:40%">
                            Branch Name
                        </th>

                        <th id="currencyHeader"
                            style="width:20%">

                            Currency

                        </th>

                        <th id="fcyHeader"
                            style="width:20%">

                            FCY

                        </th>

                        <th style="width:20%">
                            LKR Mn
                        </th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

/* ======================================================
   VARIABLES
====================================================== */

let dashboard;
let worksheet;

let mode = 'branch';

/* ======================================================
   FORMAT
====================================================== */

function formatNumber(v){

    return new Intl.NumberFormat(

        'en-US',

        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }

    ).format(v || 0);
}

/* ======================================================
   LOAD WORKSHEETS
====================================================== */

function loadWorksheetSelector(){

    const select =
        document.getElementById(
            'worksheetSelect'
        );

    select.innerHTML = '';

    dashboard.worksheets.forEach(ws => {

        const option =
            document.createElement('option');

        option.value = ws.name;
        option.textContent = ws.name;

        select.appendChild(option);

    });

    worksheet =
        dashboard.worksheets[0];
}

/* ======================================================
   GET DATA
====================================================== */

async function getData(){

    const summary =
        await worksheet.getSummaryDataAsync();

    const cols =
        summary.columns.map(c => c.fieldName);

    return summary.data.map(r => {

        let obj = {};

        r.forEach((cell, i) => {

            obj[cols[i]] = cell;

        });

        return obj;
    });
}

/* ======================================================
   PROCESS
====================================================== */

function processData(data){

    if(!data.length){
        return [];
    }

    const keys =
        Object.keys(data[0]);

    const branchField =
        keys.find(k =>
            k.toLowerCase().includes('branch')
        );

    const currencyField =
        keys.find(k =>
            k.toLowerCase().includes('currency')
        );

    const fcyField =
        keys.find(k =>
            k.toLowerCase().includes('fcy')
        );

    const lkrField =
        keys.find(k =>
            k.toLowerCase().includes('lkr')
        );

    const grouped = {};

    data.forEach(d => {

        const branch =
            d[branchField]
            ? d[branchField].formattedValue
            : '';

        const currency =
            d[currencyField]
            ? d[currencyField].formattedValue
            : '';

        const fcy =
            d[fcyField]
            ? Number(d[fcyField].nativeValue || 0)
            : 0;

        const lkr =
            d[lkrField]
            ? Number(d[lkrField].nativeValue || 0)
            : 0;

        const key =
            mode === 'branchCurrency'
            ? `${branch}|${currency}`
            : branch;

        if(!grouped[key]){

            grouped[key] = {

                branch,
                currency,
                fcy:0,
                lkr:0
            };
        }

        grouped[key].fcy += fcy;
        grouped[key].lkr += lkr;
    });

    let rows =
        Object.values(grouped);

    rows.sort((a,b) => b.lkr - a.lkr);

    const topN =
        Number(
            document.getElementById('topN').value
        ) || 10;

    return rows.slice(0, topN);
}

/* ======================================================
   RENDER
====================================================== */

function render(rows){

    const tbody =
        document.getElementById('tableBody');

    tbody.innerHTML = '';

    const showCurrency =
        mode === 'branchCurrency';

    document
        .getElementById('currencyHeader')
        .style.display =

        showCurrency ? '' : 'none';

    document
        .getElementById('fcyHeader')
        .style.display =

        showCurrency ? '' : 'none';

    rows.forEach(r => {

        const tr =
            document.createElement('tr');

        if(showCurrency){

            tr.innerHTML = `

                <td>${r.branch}</td>

                <td>
                    <span class="badge">
                        ${r.currency}
                    </span>
                </td>

                <td class="num">
                    ${formatNumber(r.fcy)}
                </td>

                <td class="num">
                    ${formatNumber(r.lkr)}
                </td>
            `;

        }else{

            tr.innerHTML = `

                <td>${r.branch}</td>

                <td class="num">
                    ${formatNumber(r.lkr)}
                </td>
            `;
        }

        tbody.appendChild(tr);
    });

    document.getElementById('rowCount').innerText =
        `${rows.length} Rows`;
}

/* ======================================================
   UPDATE
====================================================== */

async function update(){

    try{

        const raw =
            await getData();

        const rows =
            processData(raw);

        render(rows);

    }catch(error){

        console.error(error);
    }
}

/* ======================================================
   MODE UI
====================================================== */

function setMode(newMode){

    mode = newMode;

    document
        .getElementById('branchBtn')
        .classList.remove('active');

    document
        .getElementById('branchCurrencyBtn')
        .classList.remove('active');

    if(mode === 'branch'){

        document
            .getElementById('branchBtn')
            .classList.add('active');

    }else{

        document
            .getElementById('branchCurrencyBtn')
            .classList.add('active');
    }

    update();
}

/* ======================================================
   INIT
====================================================== */

window.onload = async function(){

    await tableau.extensions.initializeAsync();

    dashboard =
        tableau.extensions
        .dashboardContent
        .dashboard;

    loadWorksheetSelector();

    /* WORKSHEET CHANGE */

    document
        .getElementById('worksheetSelect')
        .addEventListener(

            'change',

            e => {

                worksheet =
                    dashboard.worksheets.find(

                        w => w.name === e.target.value
                    );

                update();
            }
        );

    /* TOP N */

    document
        .getElementById('topN')
        .addEventListener(

            'input',

            update
        );

    /* MODE */

    document
        .getElementById('branchBtn')
        .addEventListener(

            'click',

            () => setMode('branch')
        );

    document
        .getElementById('branchCurrencyBtn')
        .addEventListener(

            'click',

            () => setMode('branchCurrency')
        );

    update();
};

</script>

</body>

</html>
