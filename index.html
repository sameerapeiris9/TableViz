<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0"/>

<title>FCY Exposure Dashboard</title>

<!-- TABLEAU -->
<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>

<style>

/* ======================================================
   GLOBAL
====================================================== */

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#f4f7fb;

    font-family:
        Inter,
        Segoe UI,
        Arial,
        sans-serif;
}

/* ======================================================
   WRAPPER
====================================================== */

.wrapper{

    width:100%;
    height:100%;

    padding:18px;

    box-sizing:border-box;
}

/* ======================================================
   CARD
====================================================== */

.card{

    width:100%;
    height:100%;

    background:white;

    border-radius:24px;

    overflow:hidden;

    border:
        1px solid #e2e8f0;

    box-shadow:
        0 10px 30px rgba(15,23,42,.06);

    display:flex;
    flex-direction:column;
}

/* ======================================================
   HEADER
====================================================== */

.header{

    padding:20px 24px;

    border-bottom:
        1px solid #edf2f7;

    display:flex;
    justify-content:space-between;
    align-items:center;

    gap:16px;

    flex-wrap:wrap;
}

.header-left{

    display:flex;
    flex-direction:column;
}

.title{

    font-size:24px;
    font-weight:700;

    color:#0f172a;
}

.subtitle{

    margin-top:6px;

    font-size:13px;

    color:#64748b;
}

/* ======================================================
   TOOLBAR
====================================================== */

.toolbar{

    display:flex;
    align-items:center;
    gap:12px;
}

/* ======================================================
   TOGGLE
====================================================== */

.toggle{

    display:flex;

    background:#f1f5f9;

    border-radius:14px;

    padding:4px;

    gap:4px;
}

.toggle button{

    border:none;

    background:transparent;

    padding:10px 18px;

    border-radius:10px;

    cursor:pointer;

    font-size:14px;
    font-weight:700;

    color:#475569;

    transition:.2s;
}

.toggle button.active{

    background:white;

    color:#2563eb;

    box-shadow:
        0 2px 8px rgba(37,99,235,.15);
}

/* ======================================================
   INPUT
====================================================== */

.topN{

    width:80px;

    padding:10px 14px;

    border-radius:12px;

    border:
        1px solid #dbe3ee;

    background:white;

    outline:none;

    font-size:14px;
    font-weight:700;
}

.topN:focus{

    border-color:#2563eb;

    box-shadow:
        0 0 0 4px rgba(37,99,235,.08);
}

/* ======================================================
   TABLE
====================================================== */

.table-wrap{

    flex:1;

    overflow:auto;
}

table{

    width:100%;

    border-collapse:collapse;
}

thead{

    position:sticky;
    top:0;

    z-index:10;

    background:#f8fafc;
}

th{

    padding:16px 18px;

    text-align:left;

    font-size:12px;
    font-weight:800;

    color:#475569;

    text-transform:uppercase;

    border-bottom:
        1px solid #e2e8f0;
}

td{

    padding:16px 18px;

    border-bottom:
        1px solid #f1f5f9;

    font-size:14px;

    color:#0f172a;
}

tbody tr:nth-child(even){

    background:#fbfdff;
}

tbody tr:hover{

    background:#eef6ff;
}

.num{

    text-align:right;

    font-weight:700;

    font-variant-numeric:
        tabular-nums;
}

/* ======================================================
   BADGE
====================================================== */

.badge{

    display:inline-flex;

    align-items:center;

    padding:6px 12px;

    border-radius:999px;

    background:#eff6ff;

    color:#2563eb;

    font-size:12px;
    font-weight:700;
}

/* ======================================================
   EMPTY
====================================================== */

.empty{

    padding:60px;

    text-align:center;

    color:#94a3b8;

    font-size:15px;
}

</style>

</head>

<body>

<div class="wrapper">

    <div class="card">

        <!-- HEADER -->

        <div class="header">

            <div class="header-left">

                <div class="title">
                    FCY Exposure Dashboard
                </div>

                <div class="subtitle"
                     id="rowCount">

                    0 Rows

                </div>

            </div>

            <div class="toolbar">

                <!-- TOGGLE -->

                <div class="toggle">

                    <button
                        id="branchBtn"
                        class="active">

                        Branch

                    </button>

                    <button
                        id="branchCurrencyBtn">

                        Branch + Currency

                    </button>

                </div>

                <!-- TOP N -->

                <input
                    type="number"
                    id="topN"
                    class="topN"
                    value="10"
                    min="1"
                />

            </div>

        </div>

        <!-- TABLE -->

        <div class="table-wrap">

            <table>

                <thead>

                    <tr>

                        <th style="width:40%">
                            Branch Name
                        </th>

                        <th id="currencyHeader"
                            style="width:20%;display:none">

                            Currency

                        </th>

                        <th id="fcyHeader"
                            style="width:20%;display:none">

                            FCY

                        </th>

                        <th style="width:20%">
                            LKR MN
                        </th>

                    </tr>

                </thead>

                <tbody id="tbody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

/* ======================================================
   VARIABLES
====================================================== */

let worksheet;

let mode = 'branch';

/* ======================================================
   FORMAT
====================================================== */

function format(v){

    return new Intl.NumberFormat(

        'en-US',

        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }

    ).format(v || 0);
}

/* ======================================================
   LOAD DATA
====================================================== */

async function loadData(){

    try{

        const table =
            await worksheet.getSummaryDataAsync();

        console.log("TABLE:", table);

        const cols =
            table.columns.map(c =>
                c.fieldName
            );

        console.log("COLUMNS:", cols);

        const branchIndex =
            cols.findIndex(c =>
                c.toLowerCase().includes('branch')
            );

        const currencyIndex =
            cols.findIndex(c =>
                c.toLowerCase().includes('currency')
            );

        const fcyIndex =
            cols.findIndex(c =>
                c.toLowerCase().includes('fcy')
            );

        const lkrIndex =
            cols.findIndex(c =>
                c.toLowerCase().includes('lkr')
            );

        console.log({

            branchIndex,
            currencyIndex,
            fcyIndex,
            lkrIndex
        });

        const grouped = {};

        table.data.forEach(r => {

            const branch =
                branchIndex >= 0
                    ? r[branchIndex]?.formattedValue || ''
                    : '';

            const currency =
                currencyIndex >= 0
                    ? r[currencyIndex]?.formattedValue || ''
                    : '';

            const fcy =
                fcyIndex >= 0
                    ? Number(
                        r[fcyIndex]?.value || 0
                    )
                    : 0;

            const lkr =
                lkrIndex >= 0
                    ? Number(
                        r[lkrIndex]?.value || 0
                    )
                    : 0;

            if(!branch){
                return;
            }

            const key =

                mode === 'branchCurrency'

                ? `${branch}|${currency}`

                : branch;

            if(!grouped[key]){

                grouped[key] = {

                    branch,
                    currency,
                    fcy:0,
                    lkr:0
                };
            }

            grouped[key].fcy += fcy;
            grouped[key].lkr += lkr;
        });

        let rows =
            Object.values(grouped);

        /* SORT */

        rows.sort((a,b)=>
            b.lkr - a.lkr
        );

        /* TOP N */

        const topN =
            Number(
                document.getElementById('topN').value
            ) || 10;

        rows =
            rows.slice(0, topN);

        render(rows);

    }catch(error){

        console.error(
            "LOAD ERROR:",
            error
        );
    }
}

/* ======================================================
   RENDER
====================================================== */

function render(rows){

    const tbody =
        document.getElementById('tbody');

    tbody.innerHTML = '';

    const showCurrency =
        mode === 'branchCurrency';

    document
        .getElementById('currencyHeader')
        .style.display =

        showCurrency
            ? ''
            : 'none';

    document
        .getElementById('fcyHeader')
        .style.display =

        showCurrency
            ? ''
            : 'none';

    if(!rows.length){

        tbody.innerHTML = `

            <tr>

                <td colspan="4"
                    class="empty">

                    No rows returned from Tableau

                </td>

            </tr>

        `;

        document.getElementById('rowCount').innerText =
            `0 Rows`;

        return;
    }

    rows.forEach(r => {

        const tr =
            document.createElement('tr');

        if(showCurrency){

            tr.innerHTML = `

                <td>
                    ${r.branch}
                </td>

                <td>
                    <span class="badge">
                        ${r.currency}
                    </span>
                </td>

                <td class="num">
                    ${format(r.fcy)}
                </td>

                <td class="num">
                    ${format(r.lkr)}
                </td>

            `;

        }else{

            tr.innerHTML = `

                <td>
                    ${r.branch}
                </td>

                <td style="display:none"></td>

                <td style="display:none"></td>

                <td class="num">
                    ${format(r.lkr)}
                </td>

            `;
        }

        tbody.appendChild(tr);
    });

    document.getElementById('rowCount').innerText =
        `${rows.length} Rows`;
}

/* ======================================================
   MODE
====================================================== */

function setMode(newMode){

    mode = newMode;

    document
        .getElementById('branchBtn')
        .classList.remove('active');

    document
        .getElementById('branchCurrencyBtn')
        .classList.remove('active');

    if(mode === 'branch'){

        document
            .getElementById('branchBtn')
            .classList.add('active');

    }else{

        document
            .getElementById('branchCurrencyBtn')
            .classList.add('active');
    }

    loadData();
}

/* ======================================================
   INIT
====================================================== */

window.onload = async function(){

    try{

        await tableau.extensions.initializeAsync();

        const dashboard =
            tableau.extensions
            .dashboardContent
            .dashboard;

        console.log("DASHBOARD:", dashboard);

        worksheet =
            dashboard.worksheets.find(

                w => w.name === 'FCY_SOURCE'
            );

        console.log(
            "FOUND:",
            worksheet.name
        );

        /* EVENTS */

        document
            .getElementById('topN')
            .addEventListener(

                'input',

                loadData
            );

        document
            .getElementById('branchBtn')
            .addEventListener(

                'click',

                () => setMode('branch')
            );

        document
            .getElementById('branchCurrencyBtn')
            .addEventListener(

                'click',

                () => setMode('branchCurrency')
            );

        worksheet.addEventListener(

            tableau.TableauEventType
                .SummaryDataChanged,

            loadData
        );

        loadData();

    }catch(error){

        console.error(
            "INIT ERROR:",
            error
        );
    }
};

</script>

</body>

</html>
