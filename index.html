<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0"/>

<title>FCY Exposure Dashboard</title>

<!-- TABLEAU -->
<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>

<style>

/* ======================================================
   GLOBAL
====================================================== */

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#f4f7fb;

    font-family:
        Inter,
        Segoe UI,
        Arial,
        sans-serif;
}

/* ======================================================
   WRAPPER
====================================================== */

.wrapper{

    width:100%;
    height:100%;

    padding:18px;

    box-sizing:border-box;
}

/* ======================================================
   CARD
====================================================== */

.card{

    width:100%;
    height:100%;

    background:white;

    border-radius:24px;

    overflow:hidden;

    border:
        1px solid #e2e8f0;

    box-shadow:
        0 10px 30px rgba(15,23,42,.06);

    display:flex;
    flex-direction:column;
}

/* ======================================================
   HEADER
====================================================== */

.header{

    padding:18px 22px;

    border-bottom:
        1px solid #edf2f7;

    display:flex;
    justify-content:space-between;
    align-items:center;

    flex-wrap:wrap;

    gap:14px;
}

.header-left{

    display:flex;
    flex-direction:column;
    gap:4px;
}

.title{

    font-size:22px;
    font-weight:700;

    color:#0f172a;
}

.subtitle{

    font-size:13px;

    color:#64748b;
}

/* ======================================================
   TOOLBAR
====================================================== */

.toolbar{

    display:flex;
    align-items:center;
    gap:12px;
}

/* ======================================================
   TOGGLE
====================================================== */

.toggle{

    display:flex;

    background:#f1f5f9;

    border-radius:14px;

    padding:4px;

    gap:4px;
}

.toggle-btn{

    border:none;

    background:transparent;

    padding:10px 18px;

    border-radius:10px;

    cursor:pointer;

    font-size:13px;
    font-weight:700;

    color:#475569;

    transition:.2s;
}

.toggle-btn.active{

    background:white;

    color:#2563eb;

    box-shadow:
        0 2px 8px rgba(37,99,235,.15);
}

/* ======================================================
   INPUT
====================================================== */

.top-input{

    width:90px;

    padding:11px 14px;

    border-radius:12px;

    border:
        1px solid #dbe3ee;

    background:white;

    outline:none;

    font-size:14px;
    font-weight:700;

    color:#0f172a;
}

.top-input:focus{

    border-color:#2563eb;

    box-shadow:
        0 0 0 4px rgba(37,99,235,.08);
}

/* ======================================================
   TABLE
====================================================== */

.table-container{

    flex:1;

    overflow:auto;
}

table{

    width:100%;

    border-collapse:collapse;

    table-layout:fixed;
}

/* ======================================================
   TABLE HEADER
====================================================== */

thead{

    position:sticky;
    top:0;

    z-index:10;
}

thead tr{

    background:#f8fafc;
}

th{

    padding:16px 18px;

    text-align:left;

    font-size:12px;
    font-weight:800;

    color:#475569;

    text-transform:uppercase;

    border-bottom:
        1px solid #e2e8f0;
}

/* ======================================================
   TABLE BODY
====================================================== */

tbody tr:nth-child(even){

    background:#fbfdff;
}

tbody tr:hover{

    background:#eef6ff;
}

td{

    padding:16px 18px;

    border-bottom:
        1px solid #f1f5f9;

    font-size:14px;

    color:#0f172a;
}

.num{

    text-align:right;

    font-weight:700;

    font-variant-numeric:
        tabular-nums;
}

/* ======================================================
   BADGE
====================================================== */

.badge{

    display:inline-flex;

    padding:6px 12px;

    border-radius:999px;

    background:#eff6ff;

    color:#2563eb;

    font-size:12px;
    font-weight:700;
}

/* ======================================================
   EMPTY
====================================================== */

.empty{

    padding:40px;

    text-align:center;

    color:#94a3b8;

    font-size:14px;
}

</style>

</head>

<body>

<div class="wrapper">

    <div class="card">

        <!-- =========================================
             HEADER
        ========================================== -->

        <div class="header">

            <div class="header-left">

                <div class="title">
                    FCY Exposure Dashboard
                </div>

                <div class="subtitle"
                     id="rowCount">

                    0 Rows

                </div>

            </div>

            <!-- TOOLBAR -->

            <div class="toolbar">

                <div class="toggle">

                    <button
                        id="branchBtn"
                        class="toggle-btn active">

                        Branch

                    </button>

                    <button
                        id="branchCurrencyBtn"
                        class="toggle-btn">

                        Branch + Currency

                    </button>

                </div>

                <input
                    type="number"
                    id="topN"
                    class="top-input"
                    value="10"
                    min="1"
                />

            </div>

        </div>

        <!-- =========================================
             TABLE
        ========================================== -->

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th style="width:40%">
                            Branch Name
                        </th>

                        <th id="currencyHeader"
                            style="width:20%">

                            Currency

                        </th>

                        <th id="fcyHeader"
                            style="width:20%">

                            FCY

                        </th>

                        <th style="width:20%">
                            LKR Mn
                        </th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

/* ======================================================
   VARIABLES
====================================================== */

let worksheet;

let mode = 'branch';

/* ======================================================
   FORMAT NUMBER
====================================================== */

function formatNumber(v){

    return new Intl.NumberFormat(

        'en-US',

        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }

    ).format(v || 0);
}

/* ======================================================
   GET DATA
====================================================== */

async function getData(){

    try{

        const summaryData =
            await worksheet.getSummaryDataAsync();

        console.log("SUMMARY:", summaryData);

        const columns =
            summaryData.columns.map(c => c.fieldName);

        console.log("COLUMNS:", columns);

        const rows = [];

        summaryData.data.forEach(r => {

            const obj = {};

            r.forEach((cell, i) => {

                obj[columns[i]] = {

                    value:
                        cell.value,

                    formattedValue:
                        cell.formattedValue,

                    nativeValue:
                        cell.nativeValue
                };
            });

            rows.push(obj);
        });

        console.log("ROWS:", rows);

        return rows;

    }catch(error){

        console.error(
            "DATA ERROR:",
            error
        );

        return [];
    }
}

/* ======================================================
   PROCESS DATA
====================================================== */

function processData(data){

    if(!data.length){
        return [];
    }

    const keys =
        Object.keys(data[0]);

    console.log("AVAILABLE FIELDS:", keys);

    /* =========================================
       SMART FIELD MATCHING
    ========================================= */

    const branchField =
        keys.find(k =>
            k.toLowerCase().includes('branch')
        );

    const currencyField =
        keys.find(k =>
            k.toLowerCase().includes('currency')
        );

    const fcyField =
        keys.find(k =>
            k.toLowerCase().includes('fcy')
        );

    const lkrField =
        keys.find(k =>
            k.toLowerCase().includes('lkr')
        );

    console.log({

        branchField,
        currencyField,
        fcyField,
        lkrField

    });

    if(!branchField || !lkrField){

        return [];
    }

    const grouped = {};

    data.forEach(d => {

        const branch =
            d[branchField]
                ? (
                    d[branchField].formattedValue ??
                    d[branchField].value ??
                    ''
                )
                : '';

        const currency =
            currencyField && d[currencyField]
                ? (
                    d[currencyField].formattedValue ??
                    d[currencyField].value ??
                    ''
                )
                : '';

        const fcy =
            fcyField && d[fcyField]
                ? Number(
                    d[fcyField].nativeValue ??
                    d[fcyField].value ??
                    0
                )
                : 0;

        const lkr =
            d[lkrField]
                ? Number(
                    d[lkrField].nativeValue ??
                    d[lkrField].value ??
                    0
                )
                : 0;

        if(!branch){
            return;
        }

        const key =

            mode === 'branchCurrency'

            ? `${branch}|${currency}`

            : branch;

        if(!grouped[key]){

            grouped[key] = {

                branch,
                currency,
                fcy:0,
                lkr:0
            };
        }

        grouped[key].fcy += fcy;
        grouped[key].lkr += lkr;
    });

    let rows =
        Object.values(grouped);

    /* SORT */

    rows.sort((a,b) =>
        b.lkr - a.lkr
    );

    /* TOP N */

    const topN =
        Number(
            document.getElementById('topN').value
        ) || 10;

    rows =
        rows.slice(0, topN);

    return rows;
}

/* ======================================================
   RENDER
====================================================== */

function render(rows){

    const tbody =
        document.getElementById(
            'tableBody'
        );

    tbody.innerHTML = '';

    const showCurrency =
        mode === 'branchCurrency';

    document
        .getElementById('currencyHeader')
        .style.display =

        showCurrency
            ? ''
            : 'none';

    document
        .getElementById('fcyHeader')
        .style.display =

        showCurrency
            ? ''
            : 'none';

    if(!rows.length){

        tbody.innerHTML = `

            <tr>

                <td colspan="4"
                    class="empty">

                    No data returned from Tableau

                </td>

            </tr>

        `;

        return;
    }

    rows.forEach(r => {

        const tr =
            document.createElement('tr');

        if(showCurrency){

            tr.innerHTML = `

                <td>
                    ${r.branch}
                </td>

                <td>
                    <span class="badge">
                        ${r.currency}
                    </span>
                </td>

                <td class="num">
                    ${formatNumber(r.fcy)}
                </td>

                <td class="num">
                    ${formatNumber(r.lkr)}
                </td>

            `;

        }else{

            tr.innerHTML = `

                <td>
                    ${r.branch}
                </td>

                <td></td>

                <td></td>

                <td class="num">
                    ${formatNumber(r.lkr)}
                </td>

            `;
        }

        tbody.appendChild(tr);
    });

    document.getElementById('rowCount').innerText =
        `${rows.length} Rows`;
}

/* ======================================================
   UPDATE
====================================================== */

async function update(){

    try{

        const raw =
            await getData();

        console.log("RAW:", raw);

        const rows =
            processData(raw);

        console.log("FINAL:", rows);

        render(rows);

    }catch(error){

        console.error(
            "UPDATE ERROR:",
            error
        );
    }
}

/* ======================================================
   MODE SWITCH
====================================================== */

function setMode(newMode){

    mode = newMode;

    document
        .getElementById('branchBtn')
        .classList.remove('active');

    document
        .getElementById('branchCurrencyBtn')
        .classList.remove('active');

    if(mode === 'branch'){

        document
            .getElementById('branchBtn')
            .classList.add('active');

    }else{

        document
            .getElementById('branchCurrencyBtn')
            .classList.add('active');
    }

    update();
}

/* ======================================================
   INIT
====================================================== */

window.onload = async function(){

    try{

        await tableau.extensions.initializeAsync();

        worksheet =
            tableau.extensions
            .worksheetContent
            .worksheet;

        console.log(
            "WORKSHEET:",
            worksheet.name
        );

        worksheet.addEventListener(

            tableau.TableauEventType
                .SummaryDataChanged,

            update
        );

        document
            .getElementById('topN')
            .addEventListener(

                'input',

                update
            );

        document
            .getElementById('branchBtn')
            .addEventListener(

                'click',

                () => setMode('branch')
            );

        document
            .getElementById('branchCurrencyBtn')
            .addEventListener(

                'click',

                () => setMode('branchCurrency')
            );

        update();

    }catch(error){

        console.error(
            "INIT ERROR:",
            error
        );
    }
};

</script>

</body>

</html>
