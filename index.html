<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0"/>

<title>FCY Exposure Dashboard</title>

<!-- TABLEAU -->
<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>

<style>

/* ======================================================
   GLOBAL
====================================================== */

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#f4f7fb;

    font-family:
        Inter,
        Segoe UI,
        Arial,
        sans-serif;
}

/* ======================================================
   WRAPPER
====================================================== */

.wrapper{

    width:100%;
    height:100%;

    padding:18px;

    box-sizing:border-box;
}

/* ======================================================
   CARD
====================================================== */

.card{

    width:100%;
    height:100%;

    background:white;

    border-radius:24px;

    overflow:hidden;

    border:
        1px solid #e2e8f0;

    box-shadow:
        0 10px 30px rgba(15,23,42,.06);

    display:flex;
    flex-direction:column;
}

/* ======================================================
   HEADER
====================================================== */

.header{

    min-height:88px;

    padding:18px 22px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    border-bottom:
        1px solid #edf2f7;

    flex-wrap:wrap;

    gap:14px;
}

.header-left{

    display:flex;
    flex-direction:column;
    gap:6px;
}

.title{

    font-size:20px;
    font-weight:700;

    color:#0f172a;
}

.subtitle{

    font-size:13px;

    color:#64748b;
}

/* ======================================================
   TOOLBAR
====================================================== */

.toolbar{

    display:flex;
    align-items:center;
    gap:14px;

    flex-wrap:wrap;
}

/* ======================================================
   TOGGLE
====================================================== */

.toggle-wrap{

    display:flex;

    background:#f1f5f9;

    padding:4px;

    border-radius:14px;

    gap:4px;
}

.toggle-btn{

    border:none;

    padding:11px 18px;

    border-radius:12px;

    cursor:pointer;

    font-size:13px;
    font-weight:700;

    background:transparent;

    color:#475569;

    transition:.2s ease;
}

.toggle-btn.active{

    background:white;

    color:#2563eb;

    box-shadow:
        0 2px 8px rgba(37,99,235,.15);
}

/* ======================================================
   TOP INPUT
====================================================== */

.top-wrap{

    display:flex;
    align-items:center;
    gap:10px;
}

.top-label{

    font-size:13px;
    font-weight:700;

    color:#475569;
}

.top-input{

    width:85px;

    padding:11px 14px;

    border-radius:14px;

    border:
        1px solid #dbe3ee;

    background:white;

    outline:none;

    font-size:14px;
    font-weight:700;

    color:#0f172a;

    transition:.2s;
}

.top-input:focus{

    border-color:#2563eb;

    box-shadow:
        0 0 0 4px rgba(37,99,235,.08);
}

/* ======================================================
   TABLE
====================================================== */

.table-container{

    flex:1;

    overflow:auto;
}

table{

    width:100%;

    border-collapse:collapse;

    table-layout:fixed;
}

/* ======================================================
   HEADERS
====================================================== */

thead{

    position:sticky;
    top:0;

    z-index:99;
}

thead tr{

    background:#f8fafc;
}

th{

    padding:16px 18px;

    text-align:left;

    font-size:12px;
    font-weight:800;

    color:#475569;

    text-transform:uppercase;
    letter-spacing:.05em;

    border-bottom:
        1px solid #e2e8f0;
}

/* ======================================================
   ROWS
====================================================== */

tbody tr{

    transition:.15s ease;
}

tbody tr:nth-child(even){

    background:#fbfdff;
}

tbody tr:hover{

    background:#eef6ff;
}

td{

    padding:16px 18px;

    border-bottom:
        1px solid #f1f5f9;

    color:#0f172a;

    font-size:14px;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

/* ======================================================
   NUMERIC
====================================================== */

.num{

    text-align:right;

    font-weight:700;

    font-variant-numeric:
        tabular-nums;
}

/* ======================================================
   BADGE
====================================================== */

.badge{

    display:inline-flex;
    align-items:center;
    justify-content:center;

    padding:7px 12px;

    border-radius:999px;

    background:#eff6ff;

    color:#2563eb;

    font-size:12px;
    font-weight:700;
}

/* ======================================================
   SCROLLBAR
====================================================== */

::-webkit-scrollbar{

    width:10px;
    height:10px;
}

::-webkit-scrollbar-thumb{

    background:#cbd5e1;

    border-radius:20px;
}

::-webkit-scrollbar-track{

    background:#f8fafc;
}

</style>

</head>

<body>

<div class="wrapper">

    <div class="card">

        <!-- =========================================
             HEADER
        ========================================== -->

        <div class="header">

            <div class="header-left">

                <div class="title">
                    FCY Exposure Dashboard
                </div>

                <div class="subtitle"
                     id="rowCount">

                    0 Rows

                </div>

            </div>

            <!-- =====================================
                 TOOLBAR
            ====================================== -->

            <div class="toolbar">

                <!-- TOGGLE -->

                <div class="toggle-wrap">

                    <button
                        id="branchBtn"
                        class="toggle-btn active">

                        Branch Only

                    </button>

                    <button
                        id="branchCurrencyBtn"
                        class="toggle-btn">

                        Branch + Currency

                    </button>

                </div>

                <!-- TOP N -->

                <div class="top-wrap">

                    <div class="top-label">
                        Top N
                    </div>

                    <input
                        type="number"
                        id="topN"
                        class="top-input"
                        value="10"
                        min="1"
                    />

                </div>

            </div>

        </div>

        <!-- =========================================
             TABLE
        ========================================== -->

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th style="width:40%">
                            Branch Name
                        </th>

                        <th id="currencyHeader"
                            style="width:20%">

                            Currency

                        </th>

                        <th id="fcyHeader"
                            style="width:20%">

                            FCY

                        </th>

                        <th style="width:20%">
                            LKR Mn
                        </th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

/* ======================================================
   VARIABLES
====================================================== */

let worksheet;

let mode = 'branch';

/* ======================================================
   FORMAT
====================================================== */

function formatNumber(v){

    return new Intl.NumberFormat(

        'en-US',

        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }

    ).format(v || 0);
}

/* ======================================================
   GET DATA
====================================================== */

async function getData(){

    const summaryData =
        await worksheet.getSummaryDataAsync();

    const columns =
        summaryData.columns.map(c => c.fieldName);

    return summaryData.data.map(row => {

        let obj = {};

        row.forEach((cell, i) => {

            obj[columns[i]] = cell;

        });

        return obj;
    });
}

/* ======================================================
   PROCESS DATA
====================================================== */

function processData(data){

    if(!data.length){
        return [];
    }

    const keys =
        Object.keys(data[0]);

    const branchField =
        keys.find(k =>
            k.toLowerCase().includes('branch')
        );

    const currencyField =
        keys.find(k =>
            k.toLowerCase().includes('currency')
        );

    const fcyField =
        keys.find(k =>
            k.toLowerCase().includes('fcy')
        );

    const lkrField =
        keys.find(k =>
            k.toLowerCase().includes('lkr')
        );

    const grouped = {};

    data.forEach(d => {

        const branch =
            d[branchField]
            ? d[branchField].formattedValue
            : '';

        const currency =
            d[currencyField]
            ? d[currencyField].formattedValue
            : '';

        const fcy =
            d[fcyField]
            ? Number(d[fcyField].nativeValue || 0)
            : 0;

        const lkr =
            d[lkrField]
            ? Number(d[lkrField].nativeValue || 0)
            : 0;

        const key =
            mode === 'branchCurrency'
            ? `${branch}|${currency}`
            : branch;

        if(!grouped[key]){

            grouped[key] = {

                branch,
                currency,
                fcy:0,
                lkr:0

            };
        }

        grouped[key].fcy += fcy;
        grouped[key].lkr += lkr;
    });

    let rows =
        Object.values(grouped);

    rows.sort((a,b) => b.lkr - a.lkr);

    const topN =
        Number(
            document.getElementById('topN').value
        ) || 10;

    return rows.slice(0, topN);
}

/* ======================================================
   RENDER
====================================================== */

function render(rows){

    const tbody =
        document.getElementById('tableBody');

    tbody.innerHTML = '';

    /* SHOW/HIDE */

    document
        .getElementById('currencyHeader')
        .style.display =

        mode === 'branch'
            ? 'none'
            : '';

    document
        .getElementById('fcyHeader')
        .style.display =

        mode === 'branch'
            ? 'none'
            : '';

    rows.forEach(r => {

        const tr =
            document.createElement('tr');

        if(mode === 'branch'){

            tr.innerHTML = `

                <td>
                    ${r.branch}
                </td>

                <td class="num">
                    ${formatNumber(r.lkr)}
                </td>

            `;

        }else{

            tr.innerHTML = `

                <td>
                    ${r.branch}
                </td>

                <td>
                    <span class="badge">
                        ${r.currency}
                    </span>
                </td>

                <td class="num">
                    ${formatNumber(r.fcy)}
                </td>

                <td class="num">
                    ${formatNumber(r.lkr)}
                </td>

            `;
        }

        tbody.appendChild(tr);
    });

    document.getElementById('rowCount').innerText =
        `${rows.length} Rows`;
}

/* ======================================================
   UPDATE
====================================================== */

async function update(){

    try{

        const raw =
            await getData();

        const rows =
            processData(raw);

        render(rows);

    }catch(error){

        console.error(error);
    }
}

/* ======================================================
   TOGGLE UI
====================================================== */

function setMode(newMode){

    mode = newMode;

    document
        .getElementById('branchBtn')
        .classList.remove('active');

    document
        .getElementById('branchCurrencyBtn')
        .classList.remove('active');

    if(mode === 'branch'){

        document
            .getElementById('branchBtn')
            .classList.add('active');

    }else{

        document
            .getElementById('branchCurrencyBtn')
            .classList.add('active');
    }

    update();
}

/* ======================================================
   INIT
====================================================== */

window.onload = async function(){

    try{

        await tableau.extensions.initializeAsync();

        const dashboard =
            tableau.extensions.dashboardContent.dashboard;

        worksheet =
            dashboard.worksheets[0];

        worksheet.addEventListener(

            tableau.TableauEventType.SummaryDataChanged,

            update
        );

        /* TOP N */

        document
            .getElementById('topN')
            .addEventListener(

                'input',

                update
            );

        /* MODE BUTTONS */

        document
            .getElementById('branchBtn')
            .addEventListener(

                'click',

                () => setMode('branch')
            );

        document
            .getElementById('branchCurrencyBtn')
            .addEventListener(

                'click',

                () => setMode('branchCurrency')
            );

        update();

    }catch(error){

        console.error(
            "Initialization Error:",
            error
        );
    }
};

</script>

</body>

</html>
