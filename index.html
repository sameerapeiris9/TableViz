<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0"/>

<title>FCY Exposure Dashboard</title>

<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>

<style>

html,
body{

    margin:0;
    width:100%;
    height:100%;

    overflow:hidden;

    background:#f4f7fb;

    font-family:
        Inter,
        Segoe UI,
        sans-serif;
}

.wrapper{

    width:100%;
    height:100%;

    padding:18px;

    box-sizing:border-box;
}

.card{

    width:100%;
    height:100%;

    background:white;

    border-radius:24px;

    overflow:hidden;

    box-shadow:
        0 10px 30px rgba(15,23,42,.06);

    border:
        1px solid #e2e8f0;

    display:flex;
    flex-direction:column;
}

.header{

    padding:18px 24px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    border-bottom:
        1px solid #edf2f7;
}

.title{

    font-size:24px;
    font-weight:700;

    color:#0f172a;
}

.subtitle{

    margin-top:4px;

    font-size:13px;

    color:#64748b;
}

.toolbar{

    display:flex;
    gap:12px;
}

.toggle{

    display:flex;

    background:#f1f5f9;

    border-radius:14px;

    padding:4px;
}

.toggle button{

    border:none;

    background:transparent;

    padding:10px 18px;

    border-radius:10px;

    cursor:pointer;

    font-weight:700;

    color:#475569;
}

.toggle button.active{

    background:white;

    color:#2563eb;

    box-shadow:
        0 2px 8px rgba(37,99,235,.15);
}

.topN{

    width:80px;

    padding:10px 14px;

    border-radius:12px;

    border:
        1px solid #dbe3ee;

    font-weight:700;
}

.table-wrap{

    flex:1;

    overflow:auto;
}

table{

    width:100%;

    border-collapse:collapse;
}

thead{

    background:#f8fafc;
}

th{

    padding:16px 18px;

    text-align:left;

    font-size:12px;
    font-weight:800;

    text-transform:uppercase;

    color:#475569;

    border-bottom:
        1px solid #e2e8f0;
}

td{

    padding:16px 18px;

    border-bottom:
        1px solid #f1f5f9;

    font-size:14px;

    color:#0f172a;
}

tbody tr:hover{

    background:#eff6ff;
}

.num{

    text-align:right;

    font-weight:700;
}

.badge{

    display:inline-block;

    padding:6px 12px;

    border-radius:999px;

    background:#eff6ff;

    color:#2563eb;

    font-size:12px;
    font-weight:700;
}

.empty{

    padding:50px;

    text-align:center;

    color:#94a3b8;
}

</style>

</head>

<body>

<div class="wrapper">

    <div class="card">

        <div class="header">

            <div>

                <div class="title">
                    FCY Exposure Dashboard
                </div>

                <div class="subtitle"
                     id="rowCount">

                    0 Rows

                </div>

            </div>

            <div class="toolbar">

                <div class="toggle">

                    <button
                        id="branchBtn"
                        class="active">

                        Branch

                    </button>

                    <button
                        id="branchCurrencyBtn">

                        Branch + Currency

                    </button>

                </div>

                <input
                    type="number"
                    id="topN"
                    class="topN"
                    value="10"
                    min="1"
                />

            </div>

        </div>

        <div class="table-wrap">

            <table>

                <thead>

                    <tr>

                        <th>
                            Branch Name
                        </th>

                        <th id="currencyHeader">
                            Currency
                        </th>

                        <th id="fcyHeader">
                            FCY
                        </th>

                        <th>
                            LKR Mn
                        </th>

                    </tr>

                </thead>

                <tbody id="tbody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

let worksheet;

let mode = 'branch';

function format(v){

    return new Intl.NumberFormat(

        'en-US',

        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }

    ).format(v || 0);
}

async function loadData(){

    const data =
        await worksheet.getSummaryDataAsync();

    const cols =
        data.columns.map(c => c.fieldName);

    console.log(cols);

    const branchField =
        cols.find(c =>
            c.toLowerCase().includes('branch')
        );

    const currencyField =
        cols.find(c =>
            c.toLowerCase().includes('currency')
        );

    const fcyField =
        cols.find(c =>
            c.toLowerCase().includes('fcy')
        );

    const lkrField =
        cols.find(c =>
            c.toLowerCase().includes('lkr')
        );

    const grouped = {};

    data.data.forEach(r => {

        const branch =
            r[cols.indexOf(branchField)]
                ?.formattedValue || '';

        const currency =
            currencyField
                ? (
                    r[
                        cols.indexOf(currencyField)
                    ]?.formattedValue || ''
                )
                : '';

        const fcy =
            fcyField
                ? Number(
                    r[
                        cols.indexOf(fcyField)
                    ]?.value || 0
                )
                : 0;

        const lkr =
            Number(
                r[
                    cols.indexOf(lkrField)
                ]?.value || 0
            );

        const key =

            mode === 'branchCurrency'

            ? `${branch}|${currency}`

            : branch;

        if(!grouped[key]){

            grouped[key] = {

                branch,
                currency,
                fcy:0,
                lkr:0
            };
        }

        grouped[key].fcy += fcy;
        grouped[key].lkr += lkr;
    });

    let rows =
        Object.values(grouped);

    rows.sort((a,b)=>
        b.lkr - a.lkr
    );

    const topN =
        Number(
            document.getElementById('topN').value
        ) || 10;

    rows =
        rows.slice(0, topN);

    render(rows);
}

function render(rows){

    const tbody =
        document.getElementById('tbody');

    tbody.innerHTML = '';

    const showCurrency =
        mode === 'branchCurrency';

    document
        .getElementById('currencyHeader')
        .style.display =
            showCurrency ? '' : 'none';

    document
        .getElementById('fcyHeader')
        .style.display =
            showCurrency ? '' : 'none';

    if(!rows.length){

        tbody.innerHTML = `

            <tr>

                <td colspan="4"
                    class="empty">

                    No rows returned

                </td>

            </tr>

        `;

        return;
    }

    rows.forEach(r => {

        const tr =
            document.createElement('tr');

        if(showCurrency){

            tr.innerHTML = `

                <td>${r.branch}</td>

                <td>
                    <span class="badge">
                        ${r.currency}
                    </span>
                </td>

                <td class="num">
                    ${format(r.fcy)}
                </td>

                <td class="num">
                    ${format(r.lkr)}
                </td>

            `;

        }else{

            tr.innerHTML = `

                <td>${r.branch}</td>

                <td></td>

                <td></td>

                <td class="num">
                    ${format(r.lkr)}
                </td>

            `;
        }

        tbody.appendChild(tr);
    });

    document.getElementById('rowCount').innerText =
        `${rows.length} Rows`;
}

function setMode(m){

    mode = m;

    document
        .getElementById('branchBtn')
        .classList.remove('active');

    document
        .getElementById('branchCurrencyBtn')
        .classList.remove('active');

    if(m === 'branch'){

        document
            .getElementById('branchBtn')
            .classList.add('active');

    }else{

        document
            .getElementById('branchCurrencyBtn')
            .classList.add('active');
    }

    loadData();
}

window.onload = async function(){

    await tableau.extensions.initializeAsync();

    const dashboard =
        tableau.extensions
        .dashboardContent
        .dashboard;

    worksheet =
        dashboard.worksheets.find(

            w => w.name === 'FCY_SOURCE'
        );

    if(!worksheet){

        alert(
            'Worksheet FCY_SOURCE not found'
        );

        return;
    }

    worksheet.addEventListener(

        tableau.TableauEventType
            .SummaryDataChanged,

        loadData
    );

    document
        .getElementById('topN')
        .addEventListener(

            'input',

            loadData
        );

    document
        .getElementById('branchBtn')
        .addEventListener(

            'click',

            () => setMode('branch')
        );

    document
        .getElementById('branchCurrencyBtn')
        .addEventListener(

            'click',

            () => setMode('branchCurrency')
        );

    loadData();
};

</script>

</body>

</html>
