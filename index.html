<body>

<div class="wrapper">

    <div class="card">

        <!-- =========================================
             HEADER
        ========================================== -->

        <div class="header">

            <div>

                <div class="title">
                    Top FCY Exposure Branches
                </div>

                <div class="count"
                     id="rowCount">
                    0 Rows
                </div>

            </div>

            <!-- TOP N CONTROL -->

            <div class="toolbar">

                <label class="toolbar-label">
                    Top N
                </label>

                <input
                    type="number"
                    id="topN"
                    class="top-input"
                    value="10"
                    min="1"
                />

            </div>

        </div>

        <!-- =========================================
             TABLE
        ========================================== -->

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th style="width:35%">
                            Branch Name
                        </th>

                        <th style="width:15%">
                            Currency
                        </th>

                        <th style="width:25%">
                            FCY
                        </th>

                        <th style="width:25%">
                            LKR Mn
                        </th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<style>

/* =========================================
   TOOLBAR
========================================= */

.toolbar{

    display:flex;
    align-items:center;
    gap:10px;
}

.toolbar-label{

    font-size:13px;
    color:#475569;
    font-weight:600;
}

.top-input{

    width:80px;

    padding:10px 12px;

    border-radius:10px;

    border:
        1px solid #dbe3ee;

    background:white;

    font-size:14px;
    font-weight:600;

    outline:none;
}

.top-input:focus{

    border-color:#3b82f6;

    box-shadow:
        0 0 0 3px rgba(59,130,246,.1);
}

</style>

<script>

/* ======================================================
   VARIABLES
====================================================== */

let worksheet;

/* ======================================================
   FORMAT NUMBER
====================================================== */

function formatNumber(v){

    return new Intl.NumberFormat(

        'en-US',

        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }

    ).format(v || 0);
}

/* ======================================================
   GET TABLEAU DATA
====================================================== */

async function getSummaryDataTable(ws){

    let rows = [];

    const reader = await ws.getSummaryDataReaderAsync(

        undefined,
        { ignoreSelection:true }

    );

    for(let i=0; i<reader.pageCount; i++){

        const page = await reader.getPageAsync(i);

        rows = rows.concat(

            page.data.map(r => {

                const row = {};

                page.columns.forEach((col,idx)=>{

                    row[col.fieldName] = r[idx];

                });

                return row;
            })
        );
    }

    await reader.releaseAsync();

    return rows;
}

/* ======================================================
   PROCESS DATA
====================================================== */

function processData(data){

    if(!data.length){
        return [];
    }

    const keys =
        Object.keys(data[0]);

    const branchField =
        keys.find(k =>
            k.toLowerCase().includes('branch')
        );

    const currencyField =
        keys.find(k =>
            k.toLowerCase().includes('currency')
        );

    const fcyField =
        keys.find(k =>
            k.toLowerCase() === 'fcy'
        );

    const lkrField =
        keys.find(k =>
            k.toLowerCase().includes('lkr')
        );

    let rows = [];

    for(let i=0; i<data.length; i++){

        const d = data[i];

        const branch =
            d[branchField]
            ? d[branchField].formattedValue
            : '';

        const currency =
            d[currencyField]
            ? d[currencyField].formattedValue
            : '';

        const fcy =
            d[fcyField]
            ? Number(d[fcyField].nativeValue)
            : 0;

        const lkr =
            d[lkrField]
            ? Number(d[lkrField].nativeValue)
            : 0;

        /* IGNORE ZERO VALUES */

        if(
            fcy <= 0 ||
            lkr <= 0
        ){
            continue;
        }

        rows.push({

            branch,
            currency,
            fcy,
            lkr

        });
    }

    /* SORT DESCENDING BY LKR */

    rows.sort((a,b) => b.lkr - a.lkr);

    /* TOP N */

    const topN =
        Number(
            document.getElementById('topN').value
        ) || 10;

    return rows.slice(0, topN);
}

/* ======================================================
   RENDER TABLE
====================================================== */

function render(rows){

    const tbody =
        document.getElementById('tableBody');

    tbody.innerHTML = '';

    for(let i=0; i<rows.length; i++){

        const r = rows[i];

        const tr =
            document.createElement('tr');

        tr.innerHTML = `

            <td>
                ${r.branch}
            </td>

            <td>
                <span class="badge">
                    ${r.currency}
                </span>
            </td>

            <td class="num">
                ${formatNumber(r.fcy)}
            </td>

            <td class="num">
                ${formatNumber(r.lkr)}
            </td>

        `;

        tbody.appendChild(tr);
    }

    document.getElementById('rowCount').innerText =
        `${rows.length} Rows`;
}

/* ======================================================
   UPDATE
====================================================== */

async function update(){

    const raw =
        await getSummaryDataTable(worksheet);

    const rows =
        processData(raw);

    render(rows);
}

/* ======================================================
   INIT
====================================================== */

window.onload = function(){

    tableau.extensions.initializeAsync()

    .then(() => {

        worksheet =
            tableau.extensions
            .worksheetContent
            .worksheet;

        worksheet.addEventListener(

            tableau.TableauEventType.SummaryDataChanged,

            update
        );

        /* TOP N CHANGE */

        document
            .getElementById('topN')
            .addEventListener(

                'input',

                update
            );

        update();
    })

    .catch(error => {

        console.error(
            "Initialization Error:",
            error
        );
    });
};

</script>

</body>
